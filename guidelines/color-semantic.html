<!-- @dsCard group="Colors" viewport="700x150" subtitle="Heather accent + semantic states" name="Accent & Semantic" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--bg-app)}
.row{display:flex;gap:10px}
.sw{flex:1;height:64px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px;font:var(--text-caption-medium);box-shadow:var(--shadow-xs)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--heather-500);color:var(--paper-0)">accent</div>
  <div class="sw" style="background:var(--state-success);color:var(--paper-0)">success</div>
  <div class="sw" style="background:var(--state-warning);color:var(--ink-1)">warning</div>
  <div class="sw" style="background:var(--state-error);color:var(--paper-0)">error</div>
  <div class="sw" style="background:var(--state-warning-subtle);color:var(--ink-1)">warning subtle</div>
  <div class="sw" style="background:var(--state-error-subtle);color:var(--ink-1)">error subtle</div>
</div>
</body></html>
