<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Poetry Prompt — Mobile App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; background: var(--bg-sunken); font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 0; }
  [data-placeholder]:empty:before { content: attr(data-placeholder); color: var(--ink-3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-jsx">
const { useState, useRef, useEffect } = React;

/* ============================================================
   iOS device frame (inlined from ios-frame.jsx to avoid an
   async-load race between the two babel <script> tags).
   ============================================================ */

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{ display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center', padding: '21px 24px 19px', boxSizing: 'border-box', position: 'relative', zIndex: 20, width: '100%' }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{ fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590, fontSize: 17, lineHeight: '22px', color: c }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false, title, keyboard = false }) {
  return (
    <div style={{ width, height, borderRadius: 48, overflow: 'hidden', position: 'relative', background: dark ? '#000' : '#F2F2F7', boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)', fontFamily: '-apple-system, system-ui, sans-serif', WebkitFontSmoothing: 'antialiased' }}>
      <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50 }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && (
          <div style={{ padding: '62px 16px 10px', fontFamily: '-apple-system, system-ui', fontSize: 34, fontWeight: 700, color: dark ? '#fff' : '#000' }}>{title}</div>
        )}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
      </div>
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60, height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none' }}>
        <div style={{ width: 139, height: 5, borderRadius: 100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }} />
      </div>
    </div>
  );
}

/* ============================================================
   Poetry Prompt component primitives, inlined for this mockup.
   Source of truth for each lives in /components/**; keep in sync
   if you edit those files.
   ============================================================ */

function Button({ children, variant = 'primary', size = 'md', disabled = false, icon = null, onClick, style }) {
  const [hover, setHover] = useState(false);
  const [active, setActive] = useState(false);
  const sz = size === 'sm' ? { padding: '7px 14px', font: '600 13px/1 var(--font-sans)', radius: 'var(--radius-sm)' } : { padding: '10px 20px', font: 'var(--text-button)', radius: 'var(--radius-md)' };
  let v;
  if (disabled) v = { background: 'var(--paper-2)', color: 'var(--text-placeholder)', border: '1px solid var(--border-hairline)' };
  else if (variant === 'secondary') v = { background: 'var(--brand-subtle)', color: 'var(--green-700)', border: '1px solid var(--brand-subtle-border)' };
  else if (variant === 'ghost') v = { background: 'transparent', color: 'var(--green-700)', border: '1px solid transparent' };
  else if (variant === 'destructive') v = { background: 'var(--state-error)', color: 'var(--paper-0)', border: '1px solid transparent' };
  else v = { background: 'var(--brand-primary)', color: 'var(--text-on-brand)', border: '1px solid transparent' };
  let bg = v.background;
  if (!disabled && hover && variant === 'primary') bg = 'var(--brand-primary-hover)';
  if (!disabled && active && variant === 'primary') bg = 'var(--brand-primary-press)';
  if (!disabled && hover && variant === 'secondary') bg = 'var(--brand-subtle-border)';
  if (!disabled && hover && variant === 'ghost') bg = 'var(--paper-1)';
  return (
    <button disabled={disabled} onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => { setHover(false); setActive(false); }}
      onMouseDown={() => setActive(true)} onMouseUp={() => setActive(false)}
      style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8, font: sz.font, padding: sz.padding, borderRadius: sz.radius, cursor: disabled ? 'default' : 'pointer', transition: 'background 120ms var(--ease-standard), transform 120ms var(--ease-standard)', transform: !disabled && active ? 'scale(0.97)' : 'scale(1)', ...v, background: bg, ...style }}>
      {icon}{children}
    </button>
  );
}

function IconButton({ children, variant = 'ghost', size = 44, active = false, 'aria-label': ariaLabel, onClick, style }) {
  const [hover, setHover] = useState(false);
  const bg = variant === 'filled' ? (hover ? 'var(--brand-primary-hover)' : 'var(--brand-primary)') : (active ? 'var(--brand-subtle)' : hover ? 'var(--paper-1)' : 'transparent');
  const color = variant === 'filled' ? 'var(--text-on-brand)' : active ? 'var(--green-700)' : 'var(--ink-1)';
  return (
    <button aria-label={ariaLabel} onClick={onClick} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ width: size, height: size, borderRadius: 'var(--radius-full)', border: 'none', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: bg, color, cursor: 'pointer', transition: 'background 120ms var(--ease-standard)', ...style }}>
      {children}
    </button>
  );
}

function Input({ label, placeholder, value, onChange, type = 'text', error, style }) {
  const [focused, setFocused] = useState(false);
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6, ...style }}>
      {label && <span style={{ font: 'var(--text-label)', letterSpacing: 'var(--tracking-label)', color: 'var(--text-secondary)' }}>{label}</span>}
      <input type={type} value={value} placeholder={placeholder} onChange={onChange} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
        style={{ font: 'var(--text-body)', padding: '11px 14px', borderRadius: 'var(--radius-md)', border: `1.5px solid ${error ? 'var(--state-error)' : focused ? 'var(--brand-primary)' : 'var(--border-hairline)'}`, background: 'var(--paper-0)', color: 'var(--text-primary)', outline: 'none', transition: 'border-color 120ms var(--ease-standard)' }} />
      {error && <span style={{ font: 'var(--text-caption)', color: 'var(--state-error)' }}>{error}</span>}
    </label>
  );
}

function TextArea({ label, placeholder, value, onChange, rows = 6, poemStyle = false, style }) {
  const [focused, setFocused] = useState(false);
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6, ...style }}>
      {label && <span style={{ font: 'var(--text-label)', letterSpacing: 'var(--tracking-label)', color: 'var(--text-secondary)' }}>{label}</span>}
      <textarea value={value} placeholder={placeholder} rows={rows} onChange={onChange} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
        style={{ font: poemStyle ? 'var(--text-poem)' : 'var(--text-body)', padding: 14, borderRadius: 'var(--radius-md)', border: `1.5px solid ${focused ? 'var(--brand-primary)' : 'var(--border-hairline)'}`, background: 'var(--paper-0)', color: 'var(--text-primary)', outline: 'none', resize: 'vertical', transition: 'border-color 120ms var(--ease-standard)' }} />
    </label>
  );
}

function FormatButton({ label, active, style, onMouseDown }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      onMouseDown={onMouseDown}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      aria-label={label.name}
      style={{
        width: 34, height: 34, borderRadius: 'var(--radius-sm)', border: 'none', cursor: 'pointer',
        background: active ? 'var(--brand-subtle)' : hover ? 'var(--paper-1)' : 'transparent',
        color: active ? 'var(--green-700)' : 'var(--ink-1)',
        font: '600 15px var(--font-sans)', fontStyle: label.italic ? 'italic' : 'normal',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'background 120ms var(--ease-standard)', ...style,
      }}
    >
      {label.char}
    </button>
  );
}

function PoemEditor({ value, onChange, placeholder }) {
  const editorRef = useRef(null);
  const [active, setActive] = useState({ bold: false, italic: false });
  const [focused, setFocused] = useState(false);

  useEffect(() => {
    try { document.execCommand('defaultParagraphSeparator', false, 'br'); } catch (err) {}
  }, []);

  const refreshActive = () => {
    try {
      setActive({
        bold: document.queryCommandState('bold'),
        italic: document.queryCommandState('italic'),
      });
    } catch (err) {}
  };

  const applyFormat = (cmd) => (e) => {
    e.preventDefault();
    document.execCommand(cmd, false, null);
    refreshActive();
    if (editorRef.current) onChange(editorRef.current.innerHTML);
  };

  return (
    <div>
      <div style={{ display: 'flex', gap: 4, marginBottom: 10 }}>
        <FormatButton label={{ name: 'Bold', char: 'B' }} active={active.bold} onMouseDown={applyFormat('bold')} />
        <FormatButton label={{ name: 'Italic', char: 'I', italic: true }} active={active.italic} onMouseDown={applyFormat('italic')} />
      </div>
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        data-placeholder={placeholder}
        onInput={() => onChange(editorRef.current.innerHTML)}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        onKeyUp={refreshActive}
        onMouseUp={refreshActive}
        dangerouslySetInnerHTML={{ __html: value }}
        style={{
          font: 'var(--text-poem)', minHeight: 260, padding: 14, borderRadius: 'var(--radius-md)',
          border: `1.5px solid ${focused ? 'var(--brand-primary)' : 'var(--border-hairline)'}`,
          background: 'var(--paper-0)', color: 'var(--text-primary)', outline: 'none',
          whiteSpace: 'pre-wrap', transition: 'border-color 120ms var(--ease-standard)',
        }}
      />
    </div>
  );
}

function Switch({ checked = false, onChange, label, style }) {
  return (
    <label style={{ display: 'inline-flex', alignItems: 'center', gap: 10, cursor: 'pointer', ...style }}>
      {label && <span style={{ font: 'var(--text-body)', color: 'var(--text-primary)' }}>{label}</span>}
      <span onClick={() => onChange && onChange(!checked)} style={{ width: 44, height: 26, borderRadius: 'var(--radius-full)', background: checked ? 'var(--brand-primary)' : 'var(--paper-3)', position: 'relative', transition: 'background 200ms var(--ease-standard)', flexShrink: 0 }}>
        <span style={{ position: 'absolute', top: 3, left: checked ? 21 : 3, width: 20, height: 20, borderRadius: '50%', background: 'var(--paper-0)', boxShadow: 'var(--shadow-xs)', transition: 'left 200ms var(--ease-standard)' }} />
      </span>
    </label>
  );
}

function Radio({ label, checked = false, onChange, style }) {
  return (
    <label style={{ display: 'inline-flex', alignItems: 'center', gap: 10, cursor: 'pointer', ...style }}>
      <span onClick={() => onChange && onChange()} style={{ width: 20, height: 20, borderRadius: '50%', border: `1.5px solid ${checked ? 'var(--brand-primary)' : 'var(--border-hairline)'}`, background: 'var(--paper-0)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        {checked && <span style={{ width: 10, height: 10, borderRadius: '50%', background: 'var(--brand-primary)' }} />}
      </span>
      {label && <span style={{ font: 'var(--text-body)', color: 'var(--text-primary)' }}>{label}</span>}
    </label>
  );
}

function Badge({ children, tone = 'neutral', style }) {
  const TONES = {
    neutral: { bg: 'var(--paper-2)', color: 'var(--text-secondary)' },
    brand: { bg: 'var(--brand-subtle)', color: 'var(--green-700)' },
    accent: { bg: 'var(--accent-subtle)', color: 'var(--heather-600)' },
    warning: { bg: 'var(--state-warning-subtle)', color: 'oklch(40% 0.08 80)' },
    error: { bg: 'var(--state-error-subtle)', color: 'var(--state-error)' },
  };
  const t = TONES[tone] || TONES.neutral;
  return <span style={{ display: 'inline-flex', alignItems: 'center', font: 'var(--text-caption-medium)', letterSpacing: 'var(--tracking-caption)', padding: '3px 10px', borderRadius: 'var(--radius-full)', background: t.bg, color: t.color, ...style }}>{children}</span>;
}

function Tag({ children, selected = false, onClick, onRemove, style }) {
  return (
    <span onClick={onClick} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, font: 'var(--text-caption-medium)', padding: '6px 12px', borderRadius: 'var(--radius-full)', background: selected ? 'var(--brand-primary)' : 'var(--paper-1)', color: selected ? 'var(--text-on-brand)' : 'var(--text-secondary)', border: `1px solid ${selected ? 'transparent' : 'var(--border-hairline)'}`, cursor: onClick ? 'pointer' : 'default', transition: 'all 120ms var(--ease-standard)', ...style }}>
      {children}
      {onRemove && <span onClick={(e) => { e.stopPropagation(); onRemove(); }} style={{ display: 'inline-flex', opacity: 0.7 }}>
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1L9 9M9 1L1 9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" /></svg>
      </span>}
    </span>
  );
}

function Toast({ message, tone = 'default', visible = true }) {
  const TONES = { success: 'var(--green-700)', warning: 'oklch(45% 0.08 80)', error: 'var(--state-error)', default: 'var(--ink-1)' };
  return (
    <div style={{ position: 'absolute', bottom: 24, left: '50%', transform: `translateX(-50%) translateY(${visible ? '0' : '12px'})`, opacity: visible ? 1 : 0, pointerEvents: 'none', transition: 'all 200ms var(--ease-standard)', display: 'flex', alignItems: 'center', gap: 12, background: TONES[tone] || TONES.default, color: 'var(--paper-0)', padding: '12px 18px', borderRadius: 'var(--radius-md)', font: 'var(--text-body-medium)', boxShadow: 'var(--shadow-md)', whiteSpace: 'nowrap', zIndex: 80 }}>
      {message}
    </div>
  );
}

function Card({ children, padding = 20, interactive = false, onClick, style }) {
  const [hover, setHover] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => interactive && setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ background: 'var(--surface-card)', borderRadius: 'var(--radius-lg)', padding, boxShadow: interactive && hover ? 'var(--shadow-md)' : 'var(--shadow-sm)', transform: interactive && hover ? 'translateY(-2px)' : 'none', transition: 'all 200ms var(--ease-standard)', cursor: interactive ? 'pointer' : 'default', ...style }}>
      {children}
    </div>
  );
}

function Tabs({ tabs = [], value, onChange, style }) {
  return (
    <div style={{ display: 'flex', gap: 4, background: 'var(--paper-1)', padding: 4, borderRadius: 'var(--radius-md)', ...style }}>
      {tabs.map((t) => {
        const active = t.value === value;
        return (
          <button key={t.value} onClick={() => onChange && onChange(t.value)}
            style={{ flex: 1, padding: '8px 14px', border: 'none', borderRadius: 'var(--radius-sm)', background: active ? 'var(--paper-0)' : 'transparent', color: active ? 'var(--text-primary)' : 'var(--text-secondary)', font: active ? '600 14px var(--font-sans)' : '500 14px var(--font-sans)', boxShadow: active ? 'var(--shadow-xs)' : 'none', cursor: 'pointer', transition: 'all 120ms var(--ease-standard)' }}>
            {t.label}
          </button>
        );
      })}
    </div>
  );
}

function Dialog({ open, title, children, onClose, actions }) {
  if (!open) return null;
  return (
    <div style={{ position: 'absolute', inset: 0, background: 'oklch(20% 0.02 150 / 0.35)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--paper-0)', borderRadius: 'var(--radius-xl)', padding: 24, width: 300, boxShadow: 'var(--shadow-lg)', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {title && <div style={{ font: 'var(--text-headline)', color: 'var(--text-primary)' }}>{title}</div>}
        <div style={{ font: 'var(--text-body)', color: 'var(--text-secondary)' }}>{children}</div>
        {actions && <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>{actions}</div>}
      </div>
    </div>
  );
}

function TopAppBar({ title, onBack, right, style }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 12px', background: 'var(--bg-app)', borderBottom: '1px solid var(--border-hairline)', ...style }}>
      {onBack && (
        <button onClick={onBack} aria-label="Back" style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--ink-1)', width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
        </button>
      )}
      <div style={{ flex: 1, font: 'var(--text-title)', color: 'var(--text-primary)' }}>{title}</div>
      {right}
    </div>
  );
}

function BottomTabBar({ items = [], value, onChange, style }) {
  return (
    <div style={{ display: 'flex', background: 'var(--bg-app)', borderTop: '1px solid var(--border-hairline)', padding: '10px 8px calc(10px + env(safe-area-inset-bottom, 0px))', ...style }}>
      {items.map((it) => {
        const active = it.value === value;
        return (
          <button key={it.value} onClick={() => onChange && onChange(it.value)}
            style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, border: 'none', background: 'none', cursor: 'pointer', color: active ? 'var(--green-700)' : 'var(--ink-3)' }}>
            {it.icon}
            <span style={{ font: active ? '600 11px var(--font-sans)' : '500 11px var(--font-sans)' }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function FAB({ children, onClick, style }) {
  const [hover, setHover] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ width: 56, height: 56, borderRadius: '50%', border: 'none', background: hover ? 'var(--brand-primary-hover)' : 'var(--brand-primary)', color: 'var(--text-on-brand)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: 'var(--shadow-md)', cursor: 'pointer', transition: 'background 120ms var(--ease-standard), transform 120ms var(--ease-standard)', transform: hover ? 'scale(1.04)' : 'scale(1)', ...style }}>
      {children}
    </button>
  );
}

const AVATAR_COLORS = ['var(--green-300)', 'var(--green-500)', 'var(--heather-300)', 'var(--heather-500)', 'var(--green-700)'];
function hashColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function Avatar({ name = '', size = 40, src, style }) {
  const initials = name.split(' ').map((p) => p[0]).slice(0, 2).join('').toUpperCase();
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: src ? `center/cover no-repeat url(${src})` : hashColor(name), color: 'var(--paper-0)', display: 'flex', alignItems: 'center', justifyContent: 'center', font: `500 ${Math.round(size * 0.4)}px var(--font-sans)`, flexShrink: 0, ...style }}>
      {!src && initials}
    </div>
  );
}

function FollowButton({ following = false, onChange, size = 'sm', style }) {
  const [hover, setHover] = useState(false);
  const pad = size === 'sm' ? '6px 14px' : '10px 20px';
  const font = size === 'sm' ? '600 13px var(--font-sans)' : 'var(--text-button)';
  let bg, color, border;
  if (following) { bg = hover ? 'var(--state-error-subtle)' : 'transparent'; color = hover ? 'var(--state-error)' : 'var(--text-secondary)'; border = `1px solid ${hover ? 'var(--state-error)' : 'var(--border-hairline)'}`; }
  else { bg = hover ? 'var(--brand-primary-hover)' : 'var(--brand-primary)'; color = 'var(--text-on-brand)'; border = '1px solid transparent'; }
  return (
    <button onClick={(e) => { e.stopPropagation(); onChange && onChange(!following); }} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: pad, borderRadius: 'var(--radius-full)', font, background: bg, color, border, cursor: 'pointer', transition: 'all 120ms var(--ease-standard)', minWidth: 92, ...style }}>
      {following ? (hover ? 'Unfollow' : 'Following') : 'Follow'}
    </button>
  );
}

function ReportAction({ onReport, style }) {
  const [open, setOpen] = useState(false);
  const REASONS = ['Spam', 'Harassment or hate', 'Plagiarism', 'Something else'];
  return (
    <div style={{ position: 'relative', ...style }}>
      <button aria-label="More options" onClick={() => setOpen((o) => !o)}
        style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--ink-3)', width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.6" fill="currentColor" /><circle cx="12" cy="12" r="1.6" fill="currentColor" /><circle cx="19" cy="12" r="1.6" fill="currentColor" /></svg>
      </button>
      {open && (
        <div style={{ position: 'absolute', right: 0, top: 36, background: 'var(--paper-0)', borderRadius: 'var(--radius-md)', boxShadow: 'var(--shadow-md)', border: '1px solid var(--border-hairline)', minWidth: 176, overflow: 'hidden', zIndex: 30 }}>

          ))}
        </div>
      )}
    </div>
  );
}

function EmptyState({ title, body, action, style }) {

    <div style={{ textAlign: 'center', padding: '56px 24px', ...style }}>

}

function WriteScreen({ onBack, onSaved, onPublish, prompt }) {
  const [title, setTitle] = useState('');
  const [draft, setDraft] = useState('');
  const [status, setStatus] = useState('idle'); // idle | saving | saved
  const timeoutRef = useRef(null);

  const hasContent = draft.replace(/<[^>]*>/g, '').trim().length > 0;

  const handleChange = (html) => {
    setDraft(html);
    const hasText = html.replace(/<[^>]*>/g, '').trim().length > 0;
    setStatus(hasText ? 'saving' : 'idle');
    clearTimeout(timeoutRef.current);
    if (hasText) {
      timeoutRef.current = setTimeout(() => setStatus('saved'), 700);
    }
  };

  const handleBack = () => {
    if (hasContent) onSaved(draft);
    onBack();
  };

  const handlePublish = () => {
    onPublish({
      title: title.trim() || 'Untitled',
      full: draft,
      richHTML: true,
      tags: [],
      date: 'Just now',
      status: 'draft',
    });
  };

  return (
    <div>
      <TopAppBar title="New Poem" onBack={handleBack} right={
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ font: 'var(--text-caption)', color: 'var(--text-placeholder)' }}>
            {status === 'saving' ? 'Saving\u2026' : status === 'saved' ? 'Saved' : ''}
          </span>
          <Button size="sm" onClick={handlePublish} disabled={!hasContent}>Publish</Button>
        </div>
      } />
      <div style={{ padding: 16 }}>
        <div style={{ font: 'var(--text-caption)', color: 'var(--text-placeholder)', marginBottom: 4 }}>PROMPT</div>
        <div style={{ font: 'var(--text-prompt)', fontStyle: 'italic', color: 'var(--green-700)', marginBottom: 18 }}>{prompt || TODAYS_PROMPT}</div>
        <input
          value={title}
          onChange={(e) => setTitle(e.target.value)}
          placeholder="Title your poem…"
          style={{ width: '100%', border: 'none', outline: 'none', background: 'transparent', font: 'var(--text-headline)', color: 'var(--text-primary)', marginBottom: 6, padding: 0 }}
        />
        <div style={{ font: 'var(--text-caption)', color: 'var(--text-placeholder)', marginBottom: 18 }}>Saved privately as a draft, automatically. You choose when to publish.</div>
        <PoemEditor value={draft} onChange={handleChange} placeholder="Begin here..." />
      </div>
    </div>
  );
}

function PoemDetailScreen({ poem, onBack, onExport, onPublish, onOpenPoet }) {
  const [fav, setFav] = useState(poem.favorite || false);
  const own = poem.status !== undefined;
  return (
    <div>
      <TopAppBar title="" onBack={onBack} right={
        <div style={{ display: 'flex', gap: 2, alignItems: 'center' }}>
          {(!own || poem.status === 'published') && <IconButton aria-label="Favorite" active={fav} onClick={() => setFav(!fav)} style={{ color: fav ? 'var(--heather-500)' : 'var(--ink-1)' }}><Icon.heart filled={fav} /></IconButton>}
          {own && poem.status === 'published' && <IconButton aria-label="Export" onClick={onExport}><Icon.share /></IconButton>}
          {own && poem.status === 'draft' && <Button size="sm" onClick={() => onPublish(poem)}>Publish</Button>}
          {!own && !poem.featured && <ReportAction onReport={() => {}} />}
        </div>
      } />
      <div style={{ padding: '4px 24px 24px' }}>
        {!own && !poem.featured && (
          <div onClick={() => onOpenPoet(poem.author)} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16, cursor: 'pointer' }}>
            <Avatar name={poem.author.name} size={32} />
            <span style={{ font: 'var(--text-body-medium)', color: 'var(--text-primary)' }}>{poem.author.name}</span>
          </div>
        )}
        {poem.featured && (
          <div style={{ font: 'var(--text-caption-medium)', color: 'var(--text-secondary)', marginBottom: 16 }}>{poem.author.name}</div>
        )}
        <div style={{ font: 'var(--text-headline)', marginBottom: 6 }}>{poem.title}</div>
        <div style={{ font: 'var(--text-caption)', color: 'var(--text-placeholder)', marginBottom: 20 }}>{poem.date}</div>
        <div style={{ font: 'var(--text-poem)', color: 'var(--ink-1)', whiteSpace: 'pre-line', marginBottom: 20 }}>{poem.full}</div>
        <div style={{ display: 'flex', gap: 6 }}>{poem.tags.map(t => <Tag key={t}>{t}</Tag>)}</div>
      </div>
    </div>
  );
}

function AuthScreen({ mode, onSwitch, onContinue }) {
  const isSignup = mode === 'signup';
  return (
    <div style={{ padding: '80px 28px 24px', display: 'flex', flexDirection: 'column', gap: 22, height: '100%', boxSizing: 'border-box' }}>

        <div style={{ font: 'var(--text-body)', color: 'var(--text-secondary)' }}>{isSignup ? 'Create an account to publish and follow poets.' : 'Welcome back.'}</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {isSignup && <Input label="Name" placeholder="Your name" />}
        <Input label="Email" placeholder="you@example.com" type="email" />
        <Input label="Password" placeholder="••••••••" type="password" />
      </div>
      <Button onClick={onContinue}>{isSignup ? 'Create account' : 'Log in'}</Button>
      <div style={{ textAlign: 'center', font: 'var(--text-caption)', color: 'var(--text-secondary)' }}>
        {isSignup ? 'Already writing here? ' : 'New to Poetry Prompt? '}
        <span onClick={() => onSwitch(isSignup ? 'login' : 'signup')} style={{ color: 'var(--green-700)', fontWeight: 600, cursor: 'pointer' }}>{isSignup ? 'Log in' : 'Sign up'}</span>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(true);
  const [authMode, setAuthMode] = useState('login');
  const [tab, setTab] = useState('home');
  const [stack, setStack] = useState([]); // e.g. [{type:'write'}, {type:'poemDetail', poem}]
  const [exportOpen, setExportOpen] = useState(false);
  const [toast, setToast] = useState('');
  const [unread, setUnread] = useState(true);

  const push = (screen) => setStack(s => [...s, screen]);
  const pop = () => setStack(s => s.slice(0, -1));
  const top = stack[stack.length - 1];

  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2200); };

  if (!authed) {
    return (
      <IOSDevice>
        <AuthScreen mode={authMode} onSwitch={setAuthMode} onContinue={() => setAuthed(true)} />
      </IOSDevice>
    );
  }

  let body;
  if (top && top.type === 'write') body = <WriteScreen prompt={top.prompt} onBack={pop} onSaved={() => {}} onPublish={(poem) => push({ type: 'publish', poem })} />;
  else if (top && top.type === 'poemDetail') body = <PoemDetailScreen poem={top.poem} onBack={pop} onExport={() => setExportOpen(true)} onPublish={(poem) => push({ type: 'publish', poem })} onOpenPoet={(poet) => push({ type: 'poetProfile', poet })} />;
  else if (top && top.type === 'publish') body = <PublishScreen poem={top.poem} onBack={pop} onConfirm={() => { notify('Published to your profile and the feed'); setStack([]); }} />;
  else if (top && top.type === 'poetProfile') body = <PoetProfileScreen poet={top.poet} onBack={pop} onOpenPoem={(p) => push({ type: 'poemDetail', poem: p })} />;
  else if (top && top.type === 'notifications') body = <NotificationsScreen onBack={pop} onOpenPoet={(poet) => push({ type: 'poetProfile', poet })} />;
  else if (top && top.type === 'featuredPoet') body = <FeaturedPoetScreen feature={top.feature} onBack={pop} onOpenPoet={(poet) => push({ type: 'poetProfile', poet })} />;
  else if (top && top.type === 'explorePrompts') body = <ExplorePromptsScreen onBack={pop} onSelectPrompt={(prompt) => push({ type: 'write', prompt })} />;
  else if (top && top.type === 'category') body = <CategoryPromptsScreen category={top.category} onBack={pop} onSelectPrompt={(prompt) => push({ type: 'write', prompt })} />;
  else if (top && top.type === 'competition') body = <CompetitionDetailScreen competition={top.competition} onBack={pop} onEnter={(competition) => push({ type: 'write', prompt: competition.theme })} />;
  else if (top && top.type === 'settings') body = <SettingsScreen onBack={pop} onLogout={() => { setStack([]); setAuthed(false); setAuthMode('login'); }} />;
  else if (tab === 'home') body = <HomeScreen onOpenPoem={(p) => push({ type: 'poemDetail', poem: p })} onNewPoem={() => push({ type: 'write' })} onOpenPoet={(poet) => push({ type: 'poetProfile', poet })} onOpenFeature={() => push({ type: 'featuredPoet', feature: WEEKLY_FEATURE })} onExplorePrompts={() => push({ type: 'explorePrompts' })} onOpenCategory={(category) => push({ type: 'category', category })} onOpenCompetition={(competition) => push({ type: 'competition', competition })} />;
  else if (tab === 'feed') body = <FeedScreen
      onOpenPoem={(p) => push({ type: 'poemDetail', poem: p })}
      onOpenPoet={(poet) => push({ type: 'poetProfile', poet })}
      onOpenNotifications={() => { setUnread(false); push({ type: 'notifications' }); }}
      hasUnread={unread}
    />;
  else body = <MyProfileScreen onOpenSettings={() => push({ type: 'settings' })} onOpenPoem={(p) => push({ type: 'poemDetail', poem: p })} />;

  const showChrome = stack.length === 0;

  return (
    <IOSDevice>
      <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg-app)', paddingTop: 47 }}>
        <div style={{ flex: 1, overflow: 'auto' }}>{body}</div>
        {showChrome && (
          <React.Fragment>
            <div style={{ position: 'absolute', right: 16, bottom: 82 }}><FAB onClick={() => push({ type: 'write' })} style={{ width: 48, height: 48 }}><Icon.plus /></FAB></div>
            <BottomTabBar value={tab} onChange={setTab} items={[
              { value: 'home', label: 'Home', icon: <Icon.home /> },
              { value: 'feed', label: 'Feed', icon: <Icon.feed /> },
              { value: 'profile', label: 'Profile', icon: <Icon.user /> },
            ]} />
          </React.Fragment>
        )}
        <Dialog open={exportOpen} title="Export poem" onClose={() => setExportOpen(false)}
          actions={<Button variant="ghost" onClick={() => setExportOpen(false)}>Cancel</Button>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {['Notion', 'Google Docs', 'Email', 'PDF'].map(d => (
              <div key={d} onClick={() => { setExportOpen(false); notify('Exported to ' + d); }} style={{ padding: '10px 12px', borderRadius: 'var(--radius-md)', background: 'var(--paper-1)', cursor: 'pointer', font: 'var(--text-body-medium)' }}>{d}</div>
            ))}
          </div>
        </Dialog>
        <Toast message={toast} visible={!!toast} tone="success" />
      </div>
    </IOSDevice>
  );
}
