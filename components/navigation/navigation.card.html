<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg-sunken);font-family:var(--font-sans)}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { TopAppBar, BottomTabBar, FAB, IconButton } = window.PoetryPrompt;

function HomeIcon(a){return (<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 11l8-7 8 7v9a1 1 0 01-1 1h-4v-6H9v6H5a1 1 0 01-1-1z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>);}
function BookIcon(){return (<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 5a2 2 0 012-2h13v16H6a2 2 0 00-2 2z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>);}
function PenIcon(){return (<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>);}
function GearIcon(){return (<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.8"/><path d="M19 12a7 7 0 00-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 00-2-1.2L14 3h-4l-.6 2.6a7 7 0 00-2 1.2l-2.3-.9-2 3.4 2 1.5A7 7 0 005 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-.9c.6.5 1.3.9 2 1.2L10 21h4l.6-2.6c.7-.3 1.4-.7 2-1.2l2.3.9 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/></svg>);}
function PlusIcon(){return (<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>);}

function Demo(){
  const [tab,setTab]=React.useState('home');
  return (
    <div style={{width:375,margin:'0 auto',background:'var(--bg-app)',position:'relative',boxShadow:'var(--shadow-md)'}}>
      <TopAppBar title="My Poems" right={<IconButton aria-label="Search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.8"/><path d="M21 21l-4-4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg></IconButton>} />
      <div style={{height:220}} />
      <div style={{position:'absolute',right:16,bottom:78}}><FAB><PlusIcon/></FAB></div>
      <BottomTabBar value={tab} onChange={setTab} items={[
        {value:'home',label:'Home',icon:<HomeIcon/>},
        {value:'library',label:'Library',icon:<BookIcon/>},
        {value:'write',label:'Write',icon:<PenIcon/>},
        {value:'settings',label:'Settings',icon:<GearIcon/>},
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
