<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:24px;background:var(--bg-app);font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.col{display:flex;flex-direction:column;gap:12px;max-width:260px}
</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, TextArea, Select, Checkbox, Radio, Switch } = window.PoetryPrompt;

function HeartIcon(){return (<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.6-9.5-9C.7 8.2 2.4 4.5 6 4.5c2 0 3.4 1.1 4 2.4.6-1.3 2-2.4 4-2.4 3.6 0 5.3 3.7 3.5 7.5-2.5 4.4-9.5 9-9.5 9z" fill="currentColor"/></svg>);}
function BackIcon(){return (<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>);}

function Demo(){
  const [checked, setChecked] = React.useState(true);
  const [radio, setRadio] = React.useState('daily');
  const [on, setOn] = React.useState(true);
  return (
    <div>
      <div className="row">
        <Button variant="primary">Save poem</Button>
        <Button variant="secondary">Add tag</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="destructive">Delete</Button>
        <Button variant="primary" size="sm">Small</Button>
        <Button variant="primary" disabled>Disabled</Button>
        <IconButton aria-label="Back"><BackIcon/></IconButton>
        <IconButton aria-label="Favorite" active><HeartIcon/></IconButton>
        <IconButton aria-label="Favorite filled" variant="filled"><HeartIcon/></IconButton>
      </div>
      <div className="row">
        <div className="col">
          <Input label="Title" placeholder="Untitled poem" />
          <Input label="Email" value="not-an-email" error="Enter a valid email" />
        </div>
        <div className="col">
          <TextArea label="Draft" poemStyle rows={4} placeholder="Begin here..." />
        </div>
        <div className="col">
          <Select label="Export to" options={[{value:'notion',label:'Notion'},{value:'pdf',label:'PDF'},{value:'email',label:'Email'}]} />
        </div>
      </div>
      <div className="row">
        <Checkbox label="Include date" checked={checked} onChange={setChecked} />
        <Radio label="Daily" checked={radio==='daily'} onChange={()=>setRadio('daily')} />
        <Radio label="Weekly" checked={radio==='weekly'} onChange={()=>setRadio('weekly')} />
        <Switch label="Reminders" checked={on} onChange={setOn} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
